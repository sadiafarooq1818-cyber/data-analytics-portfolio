<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retail Sales Dashboard</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin:0; background:#f8fafc; color:#0f172a; }
    .wrap { max-width:1080px; margin:30px auto; padding:20px; }
    .title { padding:28px; background:#1e3a8a; color:white; border-radius:20px; }
    .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; margin-top:20px; }
    .card { background:white; border:1px solid #e2e8f0; border-radius:16px; padding:20px; box-shadow:0 8px 22px rgba(15,23,42,.06); }
    .label { color:#64748b; font-size:13px; font-weight:bold; }
    .value { font-size:34px; font-weight:bold; margin-top:8px; }
    .bar { height:22px; background:#dbeafe; border-radius:99px; margin:10px 0 20px; overflow:hidden; }
    .bar span { display:block; height:100%; background:#2563eb; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="title"><h1>Retail Sales Dashboard</h1><p>Dashboard demo for sales, profit, regional performance and management reporting.</p></section>
    <section class="cards">
      <div class="card"><div class="label">TOTAL SALES</div><div class="value">$27,845</div></div>
      <div class="card"><div class="label">TOTAL PROFIT</div><div class="value">$5,544</div></div>
      <div class="card"><div class="label">PROFIT MARGIN</div><div class="value">19.9%</div></div>
      <div class="card"><div class="label">TOTAL ORDERS</div><div class="value">40</div></div>
    </section>
    <section class="card" style="margin-top:20px">
      <h2>Regional Sales Performance</h2>
      <p>NSW</p><div class="bar"><span style="width:92%"></span></div>
      <p>WA</p><div class="bar"><span style="width:82%"></span></div>
      <p>VIC</p><div class="bar"><span style="width:66%"></span></div>
      <p>QLD</p><div class="bar"><span style="width:47%"></span></div>
    </section>
  </main>
</body>
</html>
