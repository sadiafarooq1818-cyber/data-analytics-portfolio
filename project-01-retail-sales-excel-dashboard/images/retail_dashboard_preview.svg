    <text x="105" y="245" font-size="34" font-weight="700" fill="#0f172a">$27,845</text>

    <rect x="340" y="165" width="235" height="110" rx="18" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="365" y="205" font-size="14" fill="#64748b">TOTAL PROFIT</text>
