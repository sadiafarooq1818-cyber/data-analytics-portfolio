    <text x="110" y="455">WA</text><rect x="165" y="437" width="300" height="24" rx="8" fill="#3b82f6"/><text x="478" y="455">$8.5k</text>
    <text x="110" y="500">VIC</text><rect x="165" y="482" width="245" height="24" rx="8" fill="#60a5fa"/><text x="423" y="500">$6.2k</text>
    <text x="110" y="545">QLD</text><rect x="165" y="527" width="175" height="24" rx="8" fill="#93c5fd"/><text x="353" y="545">$4.3k</text>
