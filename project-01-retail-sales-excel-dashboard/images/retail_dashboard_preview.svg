  <polyline points="670,545 725,505 780,520 835,470 890,445 945,410 1000,430 1055,385" fill="none" stroke="#16a34a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <g fill="#16a34a">
    <circle cx="670" cy="545" r="7"/><circle cx="725" cy="505" r="7"/><circle cx="780" cy="520" r="7"/><circle cx="835" cy="470" r="7"/>
    <circle cx="890" cy="445" r="7"/><circle cx="945" cy="410" r="7"/><circle cx="1000" cy="430" r="7"/><circle cx="1055" cy="385" r="7"/>
  </g>
