<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#f5f7fb"/>
  <rect x="40" y="35" width="1120" height="650" rx="26" fill="#ffffff" stroke="#d8dee9"/>
  <text x="80" y="92" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2937">Retail Sales Performance Dashboard</text>
  <text x="80" y="124" font-family="Arial, sans-serif" font-size="16" fill="#64748b">Excel / Power BI style executive dashboard preview for sales, profit, margin and regional performance</text>

  <g font-family="Arial, sans-serif">
    <rect x="80" y="165" width="235" height="110" rx="18" fill="#eef6ff" stroke="#c7ddff"/>
